<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Quest: Ultimate Quiz</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --text-color: #333;
            --primary: #4A90E2;
            --card-bg: #fff;
            --btn-text: #fff;
            --success: #2ecc71;
            --danger: #e74c3c;
            --google: #db4437;
            --facebook: #4267B2;
            --mobile: #27ae60;
            --next-btn: #f39c12;
        }
        [data-theme="dark"] {
            --bg-color: #1a1a2e;
            --text-color: #e0e0e0;
            --card-bg: #16213e;
            --primary: #0f3460;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; transition: 0.3s; }
        .container { max-width: 600px; margin: 0 auto; background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .nav-bar { display: flex; justify-content: space-between; margin-bottom: 20px; }
        button { background: var(--primary); color: var(--btn-text); border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-size: 16px; margin: 5px 0; width: 100%; transition: 0.2s; box-sizing: border-box; }
        button:hover { opacity: 0.8; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .hidden { display: none !important; }
        
        .btn-google { background: var(--google); }
        .btn-facebook { background: var(--facebook); }
        .btn-mobile { background: var(--mobile); }
        #btnNext { background: var(--next-btn); font-size: 18px; font-weight: bold; margin-top: 15px; }

        .books-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-height: 400px; overflow-y: auto; padding-right: 5px; }
        .book-item { background: var(--primary); color: white; padding: 10px; text-align: center; border-radius: 5px; cursor: pointer; font-size: 14px; }
        
        #levelMap { display: flex; flex-wrap: wrap; justify-content: center; }
        .level-node { width: 50px; height: 50px; background: var(--primary); color: white; border-radius: 50%; display: inline-flex; justify-content: center; align-items: center; margin: 10px; cursor: pointer; font-weight: bold; }
        
        .option-btn { background: var(--bg-color); color: var(--text-color); border: 2px solid var(--primary); text-align: left; }
        #timer { font-size: 24px; font-weight: bold; color: var(--danger); text-align: center; }
        #explanation { margin-top: 15px; font-weight: bold; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-bar">
        <button id="langToggle" style="width: auto;" onclick="toggleLanguage()">🌐 EN / NE</button>
        <button id="themeToggle" style="width: auto;" onclick="toggleTheme()">🌙 Theme</button>
    </div>

    <div id="loginScreen">
        <h1 id="loginTitle">Login to Bible Quest</h1>
        <button class="btn-google" onclick="login()"><span id="logGoogle">Login with Google</span></button>
        <button class="btn-facebook" onclick="login()"><span id="logFb">Login with Facebook</span></button>
        <button class="btn-mobile" onclick="login()"><span id="logMobile">Login with Mobile Number</span></button>
    </div>

    <div id="homeScreen" class="hidden">
        <h1 id="titleText">Bible Quest</h1>
        <p id="descText">Choose your mode and start playing!</p>
        <button onclick="showBooks()" id="btnSingle">Endless Mode (Books)</button>
        <button onclick="logout()" style="background: var(--danger); margin-top: 20px;" id="btnLogout">Logout</button>
    </div>

    <div id="booksScreen" class="hidden">
        <h2 id="booksTitle">Choose a Book</h2>
        <div class="books-grid" id="booksList"></div>
        <button onclick="goHome()" id="btnBackBooks">Back</button>
    </div>

    <div id="levelScreen" class="hidden">
        <h2 id="levelTitle">Levels</h2>
        <div id="levelMap"></div>
        <button onclick="showBooks()" id="btnBackLevels">Back to Books</button>
    </div>

    <div id="quizScreen" class="hidden">
        <div id="timer">15</div>
        <div class="nav-bar">
            <button onclick="use5050()" id="btn5050" style="width: auto;">50/50 Lifeline</button>
            <button onclick="quitQuiz()" style="background: var(--danger); width: auto;" id="btnQuit">Quit</button>
        </div>
        <h3 id="questionText">Question?</h3>
        <div id="optionsArea"></div>
        <div id="explanation" class="hidden"></div>
        <button id="btnNext" class="hidden" onclick="nextQuestion()">Next Level ➡️</button>
    </div>
</div>

<script>
    const booksEN = ["Genesis", "Exodus", "Leviticus", "Numbers", "Deuteronomy", "Joshua", "Judges", "Ruth", "1 Samuel", "2 Samuel"];
    const booksNE = ["उत्पत्ति", "प्रस्थान", "लेवी", "गन्ती", "व्यवस्था", "यहोशू", "न्यायकर्ता", "रूथ", "१ शमूएल", "२ शमूएल"];

    // 💡 नमुना प्रश्नहरूको डाटाबेस (यहाँ हजारौं प्रश्न थप्न सकिन्छ)
    const questionsDB = {
        en: {
            "Genesis": [
                { q: "Who built the Ark?", opts: ["Noah", "Moses", "David", "Abraham"], ans: 0, exp: "Genesis 6:14 - Noah built the ark." },
                { q: "Who was the first man?", opts: ["Adam", "Eve", "Cain", "Abel"], ans: 0, exp: "Genesis 2:7 - God created Adam." },
                { q: "How many days did it rain during the flood?", opts: ["7 days", "40 days", "30 days", "10 days"], ans: 1, exp: "Genesis 7:12 - It rained for 40 days and 40 nights." },
                { q: "What was the name of Abraham's wife?", opts: ["Rebekah", "Rachel", "Sarah", "Leah"], ans: 2, exp: "Genesis 17:15 - Her name was Sarah." },
                { q: "Who was sold into slavery by his brothers?", opts: ["Joseph", "Benjamin", "Reuben", "Judah"], ans: 0, exp: "Genesis 37:28 - Joseph was sold to the Ishmaelites." }
            ]
        },
        ne: {
            "उत्पत्ति": [
                { q: "परमेश्वरको आज्ञा अनुसार पानीजहाज कसले बनायो?", opts: ["नोआ", "मोशा", "दाऊद", "अब्राहाम"], ans: 0, exp: "उत्पत्ति ६:१४ - नोआले जहाज बनाए।" },
                { q: "संसारको पहिलो मानिस को थिए?", opts: ["आदम", "हव्वा", "कयिन", "हाबिल"], ans: 0, exp: "उत्पत्ति २:७ - परमेश्वरले आदमलाई बनाउनुभयो।" },
                { q: "जलप्रलयको बेला कति दिनसम्म पानी परेको थियो?", opts: ["७ दिन", "४० दिन", "३० दिन", "१० दिन"], ans: 1, exp: "उत्पत्ति ७:१२ - ४० दिन र ४० रात पानी पर्‍यो।" },
                { q: "अब्राहामकी पत्नीको नाम के थियो?", opts: ["रिबेका", "राहेल", "सारा", "लेआ"], ans: 2, exp: "उत्पत्ति १७:१५ - तिनको नाम सारा थियो।" },
                { q: "आफ्नै दाजुभाइहरूद्वारा दासको रूपमा कसलाई बेचिएको थियो?", opts: ["योसेफ", "बिन्यामीन", "रूबेन", "यहूदा"], ans: 0, exp: "उत्पत्ति ३७:२८ - योसेफलाई इस्माएलीहरूलाई बेचियो।" }
            ]
        }
    };

    const uiText = {
        en: { logTitle: "Login to Bible Quest", logG: "Login with Google", logF: "Login with Facebook", logM: "Login with Mobile", logout: "Logout", title: "Bible Quest", desc: "Choose your mode and start playing!", single: "Endless Mode (Books)", bTitle: "Choose a Book", backBooks: "Back", backLvl: "Back to Books", lifeline: "50/50 Lifeline", quit: "Quit", correct: "Correct! 🎉", wrong: "Wrong! ❌", next: "Next Level ➡️", finish: "Book Completed! 🎉" },
        ne: { logTitle: "बाइबल क्वेस्टमा लगइन गर्नुहोस्", logG: "गुगलबाट लगइन गर्नुहोस्", logF: "फेसबुकबाट लगइन गर्नुहोस्", logM: "मोबाइलबाट लगइन गर्नुहोस्", logout: "लगआउट", title: "बाइबल क्वेस्ट", desc: "आफ्नो मोड छान्नुहोस् र खेल्न सुरु गर्नुहोस्!", single: "अनन्त मोड (पुस्तकहरू)", bTitle: "पुस्तक छान्नुहोस्", backBooks: "पछाडि", backLvl: "पुस्तकहरूमा फर्कनुहोस्", lifeline: "५०/५० लाइफलाइन", quit: "छोड्नुहोस्", correct: "सही उत्तर! 🎉", wrong: "गलत उत्तर! ❌", next: "अर्को लेभल ➡️", finish: "पुस्तक पूरा भयो! 🎉" }
    };

    let currentLang = 'en';
    let timerInterval;
    let currentBook = '';
    let currentLevelIndex = 0;
    let currentBookQuestions = [];

    function toggleTheme() { document.body.toggleAttribute('data-theme', document.body.getAttribute('data-theme') !== 'dark' ? 'dark' : ''); }

    function toggleLanguage() {
        currentLang = currentLang === 'en' ? 'ne' : 'en';
        updateUI();
        if(!document.getElementById('booksScreen').classList.contains('hidden')) renderBooks();
    }

    function updateUI() {
        const t = uiText[currentLang];
        document.getElementById('loginTitle').innerText = t.logTitle; document.getElementById('logGoogle').innerText = t.logG; document.getElementById('logFb').innerText = t.logF; document.getElementById('logMobile').innerText = t.logM; document.getElementById('btnLogout').innerText = t.logout; document.getElementById('titleText').innerText = t.title; document.getElementById('descText').innerText = t.desc; document.getElementById('btnSingle').innerText = t.single; document.getElementById('booksTitle').innerText = t.bTitle; document.getElementById('btnBackBooks').innerText = t.backBooks; document.getElementById('btnBackLevels').innerText = t.backLvl; document.getElementById('btn5050').innerText = t.lifeline; document.getElementById('btnQuit').innerText = t.quit; document.getElementById('btnNext').innerText = t.next;
    }

    function hideAll() {
        ['loginScreen', 'homeScreen', 'booksScreen', 'levelScreen', 'quizScreen'].forEach(id => document.getElementById(id).classList.add('hidden'));
        clearInterval(timerInterval);
    }

    function login() { hideAll(); document.getElementById('homeScreen').classList.remove('hidden'); }
    function logout() { hideAll(); document.getElementById('loginScreen').classList.remove('hidden'); }
    function goHome() { hideAll(); document.getElementById('homeScreen').classList.remove('hidden'); }
    function quitQuiz() { hideAll(); showLevels(currentBook); }
    
    function showBooks() { 
        hideAll(); 
        renderBooks();
        document.getElementById('booksScreen').classList.remove('hidden'); 
    }

    function renderBooks() {
        const list = document.getElementById('booksList');
        list.innerHTML = '';
        const booksArray = currentLang === 'en' ? booksEN : booksNE;
        booksArray.forEach(book => {
            let div = document.createElement('div');
            div.className = 'book-item';
            div.innerText = book;
            div.onclick = () => showLevels(book);
            list.appendChild(div);
        });
    }

    function showLevels(bookName) {
        hideAll();
        currentBook = bookName;
        document.getElementById('levelTitle').innerText = bookName + " - Levels";
        document.getElementById('levelScreen').classList.remove('hidden');
        
        // Load questions for the selected book (default to empty array if no questions added yet)
        currentBookQuestions = questionsDB[currentLang][bookName] || [];
        
        const map = document.getElementById('levelMap');
        map.innerHTML = '';
        
        if(currentBookQuestions.length === 0) {
            map.innerHTML = `<p style="text-align:center; width:100%;">${currentLang === 'en' ? 'Questions coming soon!' : 'प्रश्नहरू चाँडै थपिनेछन्!'}</p>`;
            return;
        }

        // Generate level buttons dynamically based on number of questions
        currentBookQuestions.forEach((q, index) => {
            let node = document.createElement('div');
            node.className = 'level-node';
            node.innerText = index + 1;
            node.onclick = () => startQuiz(index);
            map.appendChild(node);
        });
    }

    function startQuiz(levelIndex) {
        hideAll();
        currentLevelIndex = levelIndex;
        document.getElementById('quizScreen').classList.remove('hidden');
        document.getElementById('btnNext').classList.add('hidden');
        document.getElementById('explanation').classList.add('hidden');
        document.getElementById('btn5050').disabled = false;
        
        let qData = currentBookQuestions[currentLevelIndex];
        document.getElementById('questionText').innerText = `Level ${currentLevelIndex + 1}: ${qData.q}`;
        
        const optsArea = document.getElementById('optionsArea');
        optsArea.innerHTML = '';
        qData.opts.forEach((opt, index) => {
            let btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(index, qData.ans, qData.exp);
            optsArea.appendChild(btn);
        });

        startTimer();
    }

    function startTimer() {
        let timeLeft = 15;
        document.getElementById('timer').innerText = timeLeft;
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                disableOptions();
                showExplanation(false, currentLang === 'en' ? "Time's Up!" : "समय सकियो!");
            }
        }, 1000);
    }

    function checkAnswer(selectedIndex, correctIndex, explanationText) {
        clearInterval(timerInterval);
        disableOptions();
        
        let isCorrect = selectedIndex === correctIndex;
        let btns = document.querySelectorAll('.option-btn');
        
        btns[selectedIndex].style.backgroundColor = isCorrect ? "var(--success)" : "var(--danger)";
        btns[selectedIndex].style.color = "white";
        
        if(!isCorrect) {
            btns[correctIndex].style.backgroundColor = "var(--success)"; // Show correct answer
            btns[correctIndex].style.color = "white";
        }
        
        showExplanation(isCorrect, explanationText);
    }

    function disableOptions() {
        document.querySelectorAll('.option-btn').forEach(btn => btn.disabled = true);
        document.getElementById('btn5050').disabled = true;
    }

    function showExplanation(isCorrect, expText) {
        const t = uiText[currentLang];
        const expDiv = document.getElementById('explanation');
        expDiv.classList.remove('hidden');
        
        expDiv.style.backgroundColor = isCorrect ? "var(--success)" : "var(--danger)";
        expDiv.style.color = "white";
        expDiv.innerText = `${isCorrect ? t.correct : t.wrong} \n ${expText}`;
        
        document.getElementById('btnNext').classList.remove('hidden');
    }

    function nextQuestion() {
        if(currentLevelIndex + 1 < currentBookQuestions.length) {
            startQuiz(currentLevelIndex + 1); // Go to next level
        } else {
            alert(uiText[currentLang].finish);
            showLevels(currentBook); // Back to map if book is finished
        }
    }

    function use5050() {
        let btns = document.querySelectorAll('.option-btn');
        let correctAns = currentBookQuestions[currentLevelIndex].ans;
        let hiddenCount = 0;
        
        btns.forEach((btn, index) => {
            if(index !== correctAns && hiddenCount < 2) {
                btn.style.display = 'none';
                hiddenCount++;
            }
        });
        document.getElementById('btn5050').disabled = true;
    }

    // Initialize
    updateUI();
</script>

</body>
</html>
